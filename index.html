<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderly Content Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 16px; max-width: 800px; margin: 0 auto; }
h1 { color: #a78bfa; font-size: 1.4em; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 0.85em; margin-bottom: 20px; }
.day { margin-bottom: 24px; }
.day-header { color: #a78bfa; font-size: 1.1em; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid #1e1e3a; padding-bottom: 6px; }
.tweet-card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; transition: border-color 0.2s; }
.tweet-card.posted { opacity: 0.4; border-color: #10b981; }
.tweet-card:not(.posted):hover { border-color: #a78bfa; }
.slot-label { color: #7c3aed; font-size: 0.75em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.tweet-text { white-space: pre-wrap; font-size: 0.9em; line-height: 1.5; color: #d0d0d0; }
.image-slot { margin: 10px 0; }
.image-upload-label { display: inline-block; padding: 6px 14px; background: rgba(255,255,255,0.08); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; font-size: 13px; color: #94a3b8; transition: all 0.2s; }
.image-upload-label:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
.image-preview { position: relative; display: inline-block; }
.image-preview img { max-width: 200px; max-height: 120px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.btn-remove-img { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: #ef4444; color: #fff; border: none; cursor: pointer; font-size: 12px; line-height: 22px; padding: 0; }
.actions { display: flex; gap: 8px; margin-top: 10px; }
.btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 0.8em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-copy { background: #7c3aed; color: white; }
.btn-copy:hover { background: #6d28d9; }
.btn-copy.copied { background: #10b981; }
.btn-posted { background: transparent; border: 1px solid #333; color: #888; }
.btn-posted:hover { border-color: #10b981; color: #10b981; }
.btn-posted.is-posted { background: #10b981; color: white; border-color: #10b981; }
.reply-section { margin-top: 30px; }
.reply-section h2 { color: #a78bfa; font-size: 1em; margin-bottom: 10px; }
.reply-card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.reply-trigger { color: #7c3aed; font-size: 0.8em; font-weight: 600; margin-bottom: 4px; }
.stats { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-size: 1.4em; font-weight: 700; color: #a78bfa; }
.stat-label { font-size: 0.7em; color: #666; }
</style>
</head>
<body>

<h1>Orderly Content Dashboard 💜</h1>
<p class="subtitle">Week: Mon 2 Mar - Sun 8 Mar 2026</p>
<div style="display:flex;gap:8px;margin-bottom:16px"><a href="index.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">Orderly</a><a href="tasks.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">Tasks</a><a href="betsorted.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">BetSorted</a></div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">14</div><div class="stat-label">TOTAL</div></div>
  <div class="stat"><div class="stat-num" id="remaining">14</div><div class="stat-label">REMAINING</div></div>
  <div class="stat"><div class="stat-num" id="posted-count">0</div><div class="stat-label">POSTED</div></div>
</div>

<div id="daily-data" style="margin-bottom: 24px;"></div>

<div id="content"></div>

<div class="reply-section">
<h2>Reply Templates (copy when needed)</h2>
<div id="replies"></div>
</div>

<script>
const tweets = [
  { day: "Monday 2 Mar", slot: "Morning 08:00 - Top PnL Trader Spotlight", text: `One trader made $8.6M in 7 days on Orderly.\n\nTrading ETH, BTC, SOL, PUMP, XRP, LINK, and 5 more assets.\n\nNo KYC. No sign-up. Just a wallet.\n\n$186B total volume processed. Same orderbook. Same depth.\n\norderly.network` },
  { day: "Monday 2 Mar", slot: "Afternoon 15:00 - Top 5 Builders Leaderboard", text: `Orderly builder leaderboard (7d volume):\n\n1. Orderly \u2014 $378M\n2. WOOFi Pro \u2014 $6.3M\n3. vooi.io \u2014 $62.6K\n4. LogX \u2014 $11.1K\n5. Sharpe AI \u2014 $506\n\n266 DEXs total. All sharing one orderbook.\n\nYou don\u2019t build liquidity. You plug into it.` },
  { day: "Tuesday 3 Mar", slot: "Morning 08:00 - Top Chains by Deposits", text: `Where Orderly traders deposit from:\n\n1. Solana \u2014 $9.6M\n2. Arbitrum \u2014 $1.8M\n3. Abstract \u2014 $1.4M\n4. Binance \u2014 $912K\n5. Ethereum \u2014 $653K\n\n18 chains. One orderbook. Deposit from wherever you are.\n\n$16.3M TVL across all chains.` },
  { day: "Tuesday 3 Mar", slot: "Afternoon 15:00 - Volume Milestone", text: `$186 billion.\n\nThat\u2019s Orderly\u2019s all-time volume. Not CEX. Not a single app.\n\nA shared orderbook powering 266 DEXs across 18 chains.\n\n$257M in the last 7 days alone.\n\norderly.network` },
  { day: "Wednesday 4 Mar", slot: "Morning 08:00 - User Stats", text: `8,652 traders active on Orderly on Feb 25.\n\nThat was the peak. Average is 6,332/day.\n\n590,797 trades in 7 days.\n\nNo sign-ups. No KYC. No email. Just wallets trading perps.` },
  { day: "Wednesday 4 Mar", slot: "Afternoon 15:00 - Liquidation Data", text: `$1.8M liquidated on Orderly on Feb 25 alone.\n\n410 positions wiped in a single day.\n\n1,270 liquidations over 7 days. $4.7M total.\n\nThe orderbook doesn\u2019t care about your conviction. It cares about your margin.` },
  { day: "Thursday 5 Mar", slot: "Morning 08:00 - Biggest Open Position", text: `Someone is short 93.87 units of gold (XAU) on Orderly right now.\n\nThat\u2019s ~$270K notional in a gold perp.\n\nOn a DEX. No broker. No KYC. Settled on-chain.\n\nWhere else can you short gold permissionlessly?` },
  { day: "Thursday 5 Mar", slot: "Afternoon 15:00 - Funding Rate Spotlight", text: `Funding rate snapshot on Orderly:\n\nSOL: -200.6% annualized (shorts getting paid)\nBTC: -140.2% annualized\nNVDA: +87.6%\nTSLA: +87.6%\nXAU: +43.8%\n\nCrypto, stocks, and gold perps. All on one orderbook.\n\nWhen\u2019s the last time your CEX let you trade gold and NVDA perps?` },
  { day: "Friday 6 Mar", slot: "Morning 08:00 - DEX Spotlight: WOOFi Pro", text: `WOOFi Pro did $6.3M in volume this week on Orderly.\n\n$59.5B all-time.\n\nThey didn\u2019t build a matching engine. They didn\u2019t bootstrap liquidity.\n\nThey plugged into Orderly\u2019s shared orderbook and built a frontend.\n\nThat\u2019s the model. Build what you\u2019re good at.` },
  { day: "Friday 6 Mar", slot: "Afternoon 15:00 - Ecosystem Scale", text: `Orderly by the numbers:\n\n266 DEXs launched.\n98 trading pairs.\n18 chains connected.\n$186B all-time volume.\n\nNot a DEX. The infrastructure under 266 of them.` },
  { day: "Saturday 7 Mar", slot: "Morning 08:00 - Gold/Stock Perps", text: `Gold perps on a DEX.\n\nXAU funding rate: +43.8% annualized. XAG: +43.8%.\n\nTSLA perps: +87.6%. NVDA perps: +87.6%.\n\n98 pairs total. Crypto, commodities, and stocks on one orderbook.\n\nNo TradFi account needed. Just a wallet.\n\norderly.network` },
  { day: "Saturday 7 Mar", slot: "Afternoon 15:00 - MCP / AI Builder", text: `Most protocols have docs. Orderly has an MCP server.\n\nYour AI coding assistant can query live trading data, pull SDK patterns, and scaffold a full DEX UI from a single prompt.\n\n7 tools: search docs, get SDK hooks, lookup contracts, explain workflows, query the API, pull indexer rankings, generate component guides.\n\nPoint Claude or Cursor at it. Say \u201cbuild me a perp DEX.\u201d\n\nIt knows how.\n\ngithub.com/OrderlyNetwork/orderly-mcp` },
  { day: "Sunday 8 Mar", slot: "Morning 08:00 - Referral CTA", text: `8,652 traders hit Orderly in a single day last week.\n\nRefer traders. Earn a cut of their fees. Forever.\n\nNo cap. No expiry. Just passive income from every trade your referral makes.\n\n590,797 trades happened in 7 days. Your referrals could be part of that.\n\norderly.network/referral` },
  { day: "Sunday 8 Mar", slot: "Afternoon 15:00 - Engagement Poll", text: `SOL funding is -200.6% annualized on Orderly right now.\n\nBTC is -140.2%.\n\nShorts are getting paid.\n\nWhat\u2019s your play?\n\n\ud83d\udd01 Long and pay funding\n\u2764\ufe0f Short and collect\n\ud83d\udcac Sitting this one out` }
];

const replies = [
  { trigger: "What is Orderly?", text: `Orderly is the shared orderbook behind 266 DEXs on 18 chains. $186B all-time volume. You trade on any DEX built on Orderly and get the same depth, same fills. No KYC. Just connect a wallet.` },
  { trigger: "Why not just use a CEX?", text: `8,652 traders chose Orderly in a single day. No sign-up. No KYC. 98 pairs including gold, silver, and stock perps. $257M weekly volume. Self-custody the whole time.` },
  { trigger: "How do I build on Orderly?", text: `266 teams already did. Orderly One gives you a broker code, 98 pairs, and shared liquidity from day one. $1,000 for a code (25% off with $ORDER). There's even an MCP server so your AI assistant can scaffold the whole thing: github.com/OrderlyNetwork/orderly-mcp` },
  { trigger: "What chains does Orderly support?", text: `18 chains. Top deposits right now: Solana ($9.6M), Arbitrum ($1.8M), Abstract ($1.4M), Binance ($912K), Ethereum ($653K). Deposit from any chain, trade on one orderbook.` },
  { trigger: "What can I trade?", text: `98 pairs. Crypto (BTC, ETH, SOL, memecoins), commodities (XAU, XAG), and stocks (TSLA, NVDA, AAPL). SOL funding is -200.6% annualized right now. Shorts are getting paid.` }
];

const STORAGE_KEY = 'orderly-dashboard-2026-03-02';

function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateStats() {
  const state = getState();
  const postedCount = Object.values(state).filter(Boolean).length;
  document.getElementById('posted-count').textContent = postedCount;
  document.getElementById('remaining').textContent = tweets.length - postedCount;
}

function render() {
  const container = document.getElementById('content');
  const state = getState();
  let currentDay = '';
  let html = '';

  tweets.forEach((t, i) => {
    if (t.day !== currentDay) {
      if (currentDay) html += '</div>';
      currentDay = t.day;
      html += `<div class="day"><div class="day-header">${t.day}</div>`;
    }
    const posted = state[i] ? 'posted' : '';
    const imgState = getImageState(i);
    html += `
      <div class="tweet-card ${posted}" id="card-${i}">
        <div class="slot-label">${t.slot}</div>
        <div class="tweet-text">${t.text}</div>
        <div class="image-slot" id="img-slot-${i}">
          ${imgState ? `<div class="image-preview"><img src="${imgState}" alt="Tweet image" /><button class="btn-remove-img" onclick="removeImage(${i})">✕</button></div>` : `<label class="image-upload-label" for="img-upload-${i}">📎 Add image<input type="file" id="img-upload-${i}" accept="image/*" onchange="handleImageUpload(${i}, this)" hidden /></label>`}
        </div>
        <div class="actions">
          <button class="btn btn-copy" onclick="copyTweet(${i})">Copy</button>
          <button class="btn btn-posted ${state[i] ? 'is-posted' : ''}" onclick="togglePosted(${i})">${state[i] ? '✓ Posted' : 'Mark Posted'}</button>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;

  const repliesHtml = replies.map((r, i) => `
    <div class="reply-card">
      <div class="reply-trigger">${r.trigger}</div>
      <div class="tweet-text">${r.text}</div>
      <div class="actions"><button class="btn btn-copy" onclick="copyReply(${i})">Copy</button></div>
    </div>`).join('');
  document.getElementById('replies').innerHTML = repliesHtml;
  updateStats();
}

function copyTweet(i) {
  navigator.clipboard.writeText(tweets[i].text);
  const btn = document.querySelector(`#card-${i} .btn-copy`);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
}

function copyReply(i) {
  navigator.clipboard.writeText(replies[i].text);
  event.target.textContent = 'Copied!';
  event.target.classList.add('copied');
  setTimeout(() => { event.target.textContent = 'Copy'; event.target.classList.remove('copied'); }, 1500);
}

function togglePosted(i) {
  const state = getState();
  state[i] = !state[i];
  saveState(state);
  render();
}

const IMG_KEY = 'orderly-dashboard-images';
function getImages() { try { return JSON.parse(localStorage.getItem(IMG_KEY)) || {}; } catch { return {}; } }
function saveImages(imgs) { localStorage.setItem(IMG_KEY, JSON.stringify(imgs)); }
function getImageState(i) { return getImages()[i] || null; }

function handleImageUpload(i, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const imgs = getImages();
    imgs[i] = e.target.result;
    saveImages(imgs);
    render();
  };
  reader.readAsDataURL(file);
}

function removeImage(i) {
  const imgs = getImages();
  delete imgs[i];
  saveImages(imgs);
  render();
}

render();

// Load daily data-driven tweets
fetch('daily-tweets.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById('daily-data');
    if (!data.tweets || !data.tweets.length) { el.innerHTML = ''; return; }
    const DAILY_KEY = 'orderly-daily-' + data.date;
    let dState = {};
    try { dState = JSON.parse(localStorage.getItem(DAILY_KEY)) || {}; } catch {}
    function saveDailyState() { localStorage.setItem(DAILY_KEY, JSON.stringify(dState)); }

    function renderDaily() {
      let html = `<div style="margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="color: #10b981; font-size: 1.1em;">📊 Daily Data Tweets — ${data.date}</h2>
        <span style="color: #666; font-size: 0.8em;">${data.source || 'Live API data'}</span>
      </div>`;
      data.tweets.forEach((t, i) => {
        const posted = dState[i] ? 'posted' : '';
        html += `
          <div class="tweet-card ${posted}" id="daily-card-${i}">
            <div class="slot-label" style="color: #10b981;">${t.slot || 'Data Tweet #' + (i+1)}</div>
            <div class="tweet-text">${t.text}</div>
            ${t.reply ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e1e3a;">
              <div class="slot-label" style="color: #666;">↩️ Reply / Thread</div>
              <div class="tweet-text" style="color: #888;">${t.reply}</div>
              <div class="actions"><button class="btn btn-copy" onclick="navigator.clipboard.writeText(this.closest('.tweet-card').querySelectorAll('.tweet-text')[1].textContent);this.textContent='Copied!';this.classList.add('copied');setTimeout(()=>{this.textContent='Copy Reply';this.classList.remove('copied')},1500)">Copy Reply</button></div>
            </div>` : ''}
            <div class="actions">
              <button class="btn btn-copy" onclick="navigator.clipboard.writeText(${JSON.stringify(JSON.stringify(t.text))});this.textContent='Copied!';this.classList.add('copied');setTimeout(()=>{this.textContent='Copy';this.classList.remove('copied')},1500)">Copy</button>
              <button class="btn btn-posted ${dState[i] ? 'is-posted' : ''}" onclick="dState[${i}]=!dState[${i}];saveDailyState();renderDaily();">${dState[i] ? '✓ Posted' : 'Mark Posted'}</button>
            </div>
          </div>`;
      });
      el.innerHTML = html;
    }
    window.dState = dState;
    window.saveDailyState = saveDailyState;
    window.renderDaily = renderDaily;
    renderDaily();
  })
  .catch(() => { document.getElementById('daily-data').innerHTML = '<p style="color:#666;font-size:0.85em;">No daily data tweets yet. They generate at 7AM SAST.</p>'; });
</script>
</body>
</html>
