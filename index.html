<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderly Content Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 16px; max-width: 800px; margin: 0 auto; }
h1 { color: #a78bfa; font-size: 1.4em; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 0.85em; margin-bottom: 20px; }
.day { margin-bottom: 24px; }
.day-header { color: #a78bfa; font-size: 1.1em; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid #1e1e3a; padding-bottom: 6px; }
.tweet-card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; transition: border-color 0.2s; }
.tweet-card.posted { opacity: 0.4; border-color: #10b981; }
.tweet-card:not(.posted):hover { border-color: #a78bfa; }
.slot-label { color: #7c3aed; font-size: 0.75em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.tweet-text { white-space: pre-wrap; font-size: 0.9em; line-height: 1.5; color: #d0d0d0; }
.image-slot { margin: 10px 0; }
.image-upload-label { display: inline-block; padding: 6px 14px; background: rgba(255,255,255,0.08); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; font-size: 13px; color: #94a3b8; transition: all 0.2s; }
.image-upload-label:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
.image-preview { position: relative; display: inline-block; }
.image-preview img { max-width: 200px; max-height: 120px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.btn-remove-img { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: #ef4444; color: #fff; border: none; cursor: pointer; font-size: 12px; line-height: 22px; padding: 0; }
.actions { display: flex; gap: 8px; margin-top: 10px; }
.btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 0.8em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-copy { background: #7c3aed; color: white; }
.btn-copy:hover { background: #6d28d9; }
.btn-copy.copied { background: #10b981; }
.btn-posted { background: transparent; border: 1px solid #333; color: #888; }
.btn-posted:hover { border-color: #10b981; color: #10b981; }
.btn-posted.is-posted { background: #10b981; color: white; border-color: #10b981; }
.reply-section { margin-top: 30px; }
.reply-section h2 { color: #a78bfa; font-size: 1em; margin-bottom: 10px; }
.reply-card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.reply-trigger { color: #7c3aed; font-size: 0.8em; font-weight: 600; margin-bottom: 4px; }
.stats { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-size: 1.4em; font-weight: 700; color: #a78bfa; }
.stat-label { font-size: 0.7em; color: #666; }
</style>
</head>
<body>

<h1>Orderly Content Dashboard 💜</h1>
<p class="subtitle">Week: Tue 25 Feb - Mon 3 Mar 2026</p>
<div style="display:flex;gap:8px;margin-bottom:16px"><a href="index.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">Orderly</a><a href="tasks.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">Tasks</a><a href="betsorted.html" style="color:#a78bfa;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #2d2060;border-radius:6px">BetSorted</a></div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">14</div><div class="stat-label">TOTAL</div></div>
  <div class="stat"><div class="stat-num" id="remaining">14</div><div class="stat-label">REMAINING</div></div>
  <div class="stat"><div class="stat-num" id="posted-count">0</div><div class="stat-label">POSTED</div></div>
</div>

<div id="daily-data" style="margin-bottom: 24px;"></div>

<div id="content"></div>

<div class="reply-section">
<h2>Reply Templates (copy when needed)</h2>
<div id="replies"></div>
</div>

<script>

  { day: "Tuesday 25 Feb", slot: "Morning - Orderly One Hook", text: `You do not need a dev team to launch a perp DEX.\n\nOrderly One gives you:\n\n98 trading pairs.\nShared liquidity from day one.\nStock perps (NVDA, TSLA, AAPL).\nYour fees. Your brand.\n\n$1,000 for a broker code. 25% off with $ORDER.\n\n263 teams already launched.` },

  { day: "Wednesday 26 Feb", slot: "Afternoon - Referral Program CTA", text: `Refer traders to Orderly. Earn rewards. No cap.\n\nHow it works:\n1. Get your referral link\n2. Share it\n3. Earn on every trade they make\n\nNo minimum. No expiry. Just volume.` },
  { day: "Thursday 27 Feb", slot: "Morning - Social Proof", text: `263 DEXs launched on Orderly.\n\nNot 263 signups.\nNot 263 waitlist entries.\n\n263 live, trading DEXs.\n\nFrom wallet apps to AI agents to DeFi protocols. All sharing one orderbook.\n\nThe cold start problem is solved. The question now is: what will you build on top?` },
  { day: "Thursday 27 Feb", slot: "Afternoon - Ecosystem Milestone", text: `Orderly Network this week:\n\n$200M in 7-day volume.\n$1.8B in 30-day volume.\n$73B year to date.\n$185B all-time.\n\n263 active DEXs. 98 trading pairs. 18+ chains.\n\nClosing in on $200B. Quietly.` },
  { day: "Friday 28 Feb", slot: "Morning - Refer-a-DEX", text: `Know someone who should launch a perp DEX?\n\nRefer-a-DEX: earn rewards for every team that launches on Orderly through your link.\n\nKOLs. DAO leaders. Community builders. Developers.\n\nIf they can run a community, they can run a DEX.\n\nYou get paid for making the intro.` },
  { day: "Friday 28 Feb", slot: "Afternoon - Objection Buster", text: `"But I am not a developer."\n\nGood.\n\nOrderly One is built for non-developers.\n\nTraders who want their own platform.\nCommunities that want to earn fees.\nKOLs who want more than affiliate commissions.\n\nNo code. No servers. No liquidity bootstrapping.\n\n$1,000 broker code. 25% off with $ORDER. Live in minutes.` },
  { day: "Saturday 1 Mar", slot: "Morning - DEX Spotlight: Sharpe AI", text: `DEX Spotlight: @SharpeSignals\n\nAI-native trading on Orderly infrastructure.\n\nSharpe built their own interface. Their own algo tools. Their own community.\n\nThe orderbook, liquidity, and settlement? That is Orderly.\n\nAI agents + shared liquidity. This is where DeFi is going.` },
  { day: "Saturday 1 Mar", slot: "Afternoon - Referral Maths", text: `Quick maths on the referral program:\n\nRefer 10 traders who do $100K/month each.\nThat is $1M in monthly volume from your link.\n\nAt standard referral rates, that is real recurring income. No cap.\n\nYour link. Your network. Your upside.` },
  { day: "Sunday 2 Mar", slot: "Morning - Community Poll", text: `Quick one.\n\nIf you could trade any asset as a perp on Orderly, what would you add?\n\nDrop it below. We read every reply.\n\n(Stock perps already live: NVDA, TSLA, AAPL, GOOGL, META, AMZN, MSFT, SPY, QQQ)` },
  { day: "Sunday 2 Mar", slot: "Afternoon - Refer-a-DEX Reminder", text: `Weekend reminder: you can earn rewards for every DEX that launches on Orderly through your referral.\n\nNot traders. Entire DEXs.\n\nOne good intro to a builder, a DAO, or a community leader could be worth more than months of trading referrals.` },
  { day: "Monday 3 Mar", slot: "Morning - Mini Spotlight", text: `263 DEXs on Orderly.\n\nHere are 5 you may not know:\n\n@voabordefi\n@AskJimmy\n@FunlAI\n@alphanaut\n@PindeXYZ\n\nSame liquidity. Different audiences. That is the point.` },
  { day: "Monday 3 Mar", slot: "Afternoon - Week Tease", text: `Monday we drop fresh builder data. Volume leaderboards. Growth stories.\n\n263 DEXs and counting. The next one might be yours.` },
  { day: "Evergreen", slot: "Infra vs Vapourware", text: `263 DEXs built on Orderly.\n\nNot 263 "partnerships." Not 263 "coming soons."\n\n263 live products sharing one orderbook.\n\nThat's the difference between infra and vapourware.` },
  { day: "Evergreen", slot: "Gold Perps", text: `You can long gold on a DEX now.\n\nPERP_XAU_USDC on Orderly. Fully onchain. No KYC. No broker. Just you and the chart.\n\nTry doing that on Binance without 47 forms.` },
  { day: "Evergreen", slot: "Volume Flex", text: `$1.8B in perp volume last 30 days.\n\nQuietly. No airdrop farming. No wash trading incentives.\n\nJust real traders using real products built on Orderly.` },
  { day: "Evergreen", slot: "Builder Speed", text: `Launching a perpDEX used to take 12 months and $2M.\n\nOn Orderly it takes a weekend and some coffee.\n\n263 teams figured that out already.` },
  { day: "Evergreen", slot: "Stock Perps", text: `You can trade NVDA, TSLA, and AAPL perps on a DEX.\n\nNo brokerage account. No market hours. No PDT rule.\n\nOrderly has stock perps live right now. Most people don't know this yet.` }

const replies = [
  { trigger: "When someone asks about launching a DEX", text: `Orderly One. No code. Shared orderbook. 98 pairs including stock perps. Live in minutes. $1,000 broker code, 25% off with $ORDER.` },
  { trigger: "When someone tweets about fragmented liquidity", text: `This is why Orderly built a shared orderbook. 263 DEXs, one book. Your Solana trader fills against the same depth as your Arbitrum trader.` },
  { trigger: "When someone tweets about AI trading agents", text: `Orderly has an MCP server. AI assistants like Claude can build, trade, and manage perp DEXs through natural language. Full orderbook access, algo orders, multi-chain support.` },
  { trigger: "🤖 MCP — AI coding tools (Cursor/Claude/Copilot)", text: `Orderly built an MCP server for this. Point Claude or Cursor at it and say "build me a perp trading dashboard." It knows every SDK hook, every contract address, every API endpoint. 263 DEXs were built on this infra. AI can build the next one.` },
  { trigger: "🤖 MCP — Someone building a DEX", text: `Orderly has an MCP server with 7 tools. Your AI assistant can search the full docs, pull SDK patterns, look up contract addresses on 18 chains, and scaffold a complete perp DEX UI from a single prompt. Open source: github.com/OrderlyNetwork/orderly-mcp` },
  { trigger: "🤖 MCP — AI agents in DeFi", text: `Most protocols give you docs. Orderly gives you an MCP server. 7 tools: search docs, get SDK patterns, lookup contracts, explain workflows, query the REST + WebSocket API, pull indexer rankings, and generate component guides. AI-native infra for perp DEXs.` },
  { trigger: "🤖 MCP — Someone mentions MCP protocol", text: `Orderly Network has one. 7 tools covering the full SDK, contract addresses on 18 chains, REST + WebSocket API docs, indexer rankings (top traders, PnL, volume), and step-by-step workflow guides. Ask your AI to build a perp DEX. It knows how. github.com/OrderlyNetwork/orderly-mcp` },
  { trigger: "🤖 MCP — What can you build with MCP?", text: `Point it at Orderly's MCP server and ask for a trading dashboard with live orderbook, position management, and order entry. It has every hook pattern from the SDK, real code examples from 263 live DEXs, and contract addresses for every supported chain. One prompt.` },
  { trigger: "🤖 MCP — Onchain data / analytics", text: `Orderly's MCP server includes indexer API tools. Query top traders by PnL, volume rankings, daily stats, liquidation data, deposit/withdrawal rankings. All real-time. All onchain. Your AI assistant can pull this data in natural language. github.com/OrderlyNetwork/orderly-mcp` },
  { trigger: "🤖 MCP — DeFi developer experience", text: `Orderly's developer stack: SDK with 20+ hooks, MCP server for AI-assisted building, shared orderbook (no cold start), 98 perp pairs, 18 chains. Launch a perp DEX and keep 100% of fees. The MCP alone has 7 tools covering docs, contracts, patterns, and live data.` },
  { trigger: "🤖 MCP — Quick short reply", text: `Orderly has an MCP server. 7 tools. Your AI codes a full perp DEX from a prompt. github.com/OrderlyNetwork/orderly-mcp` },
  { trigger: "When someone asks about stock perps", text: `NVDA, TSLA, AAPL, GOOGL, META, AMZN, MSFT, SPY, QQQ. All live on Orderly. Onchain. No KYC. No market hours. Settled in USDC.` },
  { trigger: "When someone mentions Hyperliquid", text: `Different model. HL is one DEX. Orderly powers 263. Builders keep their brand, their fees, and plug into shared liquidity. Infra layer vs application layer.` },
  { trigger: "When someone complains about CEX", text: `98 perp pairs on Orderly. Zero KYC. Onchain settlement. Your keys, your position.` }
];

const STORAGE_KEY = 'orderly-dashboard-2026-02-25';

function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateStats() {
  const state = getState();
  const postedCount = Object.values(state).filter(Boolean).length;
  document.getElementById('posted-count').textContent = postedCount;
  document.getElementById('remaining').textContent = tweets.length - postedCount;
}

function render() {
  const container = document.getElementById('content');
  const state = getState();
  let currentDay = '';
  let html = '';

  tweets.forEach((t, i) => {
    if (t.day !== currentDay) {
      if (currentDay) html += '</div>';
      currentDay = t.day;
      html += `<div class="day"><div class="day-header">${t.day}</div>`;
    }
    const posted = state[i] ? 'posted' : '';
    const imgState = getImageState(i);
    html += `
      <div class="tweet-card ${posted}" id="card-${i}">
        <div class="slot-label">${t.slot}</div>
        <div class="tweet-text">${t.text}</div>
        <div class="image-slot" id="img-slot-${i}">
          ${imgState ? `<div class="image-preview"><img src="${imgState}" alt="Tweet image" /><button class="btn-remove-img" onclick="removeImage(${i})">✕</button></div>` : `<label class="image-upload-label" for="img-upload-${i}">📎 Add image<input type="file" id="img-upload-${i}" accept="image/*" onchange="handleImageUpload(${i}, this)" hidden /></label>`}
        </div>
        <div class="actions">
          <button class="btn btn-copy" onclick="copyTweet(${i})">Copy</button>
          <button class="btn btn-posted ${state[i] ? 'is-posted' : ''}" onclick="togglePosted(${i})">${state[i] ? '✓ Posted' : 'Mark Posted'}</button>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;

  const repliesHtml = replies.map((r, i) => `
    <div class="reply-card">
      <div class="reply-trigger">${r.trigger}</div>
      <div class="tweet-text">${r.text}</div>
      <div class="actions"><button class="btn btn-copy" onclick="copyReply(${i})">Copy</button></div>
    </div>`).join('');
  document.getElementById('replies').innerHTML = repliesHtml;
  updateStats();
}

function copyTweet(i) {
  navigator.clipboard.writeText(tweets[i].text);
  const btn = document.querySelector(`#card-${i} .btn-copy`);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
}

function copyReply(i) {
  navigator.clipboard.writeText(replies[i].text);
  event.target.textContent = 'Copied!';
  event.target.classList.add('copied');
  setTimeout(() => { event.target.textContent = 'Copy'; event.target.classList.remove('copied'); }, 1500);
}

function togglePosted(i) {
  const state = getState();
  state[i] = !state[i];
  saveState(state);
  render();
}

const IMG_KEY = 'orderly-dashboard-images';
function getImages() { try { return JSON.parse(localStorage.getItem(IMG_KEY)) || {}; } catch { return {}; } }
function saveImages(imgs) { localStorage.setItem(IMG_KEY, JSON.stringify(imgs)); }
function getImageState(i) { return getImages()[i] || null; }

function handleImageUpload(i, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const imgs = getImages();
    imgs[i] = e.target.result;
    saveImages(imgs);
    render();
  };
  reader.readAsDataURL(file);
}

function removeImage(i) {
  const imgs = getImages();
  delete imgs[i];
  saveImages(imgs);
  render();
}

render();

// Load daily data-driven tweets
fetch('daily-tweets.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById('daily-data');
    if (!data.tweets || !data.tweets.length) { el.innerHTML = ''; return; }
    const DAILY_KEY = 'orderly-daily-' + data.date;
    let dState = {};
    try { dState = JSON.parse(localStorage.getItem(DAILY_KEY)) || {}; } catch {}
    function saveDailyState() { localStorage.setItem(DAILY_KEY, JSON.stringify(dState)); }

    function renderDaily() {
      let html = `<div style="margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="color: #10b981; font-size: 1.1em;">📊 Daily Data Tweets — ${data.date}</h2>
        <span style="color: #666; font-size: 0.8em;">${data.source || 'Live API data'}</span>
      </div>`;
      data.tweets.forEach((t, i) => {
        const posted = dState[i] ? 'posted' : '';
        html += `
          <div class="tweet-card ${posted}" id="daily-card-${i}">
            <div class="slot-label" style="color: #10b981;">${t.slot || 'Data Tweet #' + (i+1)}</div>
            <div class="tweet-text">${t.text}</div>
            ${t.reply ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e1e3a;">
              <div class="slot-label" style="color: #666;">↩️ Reply / Thread</div>
              <div class="tweet-text" style="color: #888;">${t.reply}</div>
              <div class="actions"><button class="btn btn-copy" onclick="navigator.clipboard.writeText(this.closest('.tweet-card').querySelectorAll('.tweet-text')[1].textContent);this.textContent='Copied!';this.classList.add('copied');setTimeout(()=>{this.textContent='Copy Reply';this.classList.remove('copied')},1500)">Copy Reply</button></div>
            </div>` : ''}
            <div class="actions">
              <button class="btn btn-copy" onclick="navigator.clipboard.writeText(${JSON.stringify(JSON.stringify(t.text))});this.textContent='Copied!';this.classList.add('copied');setTimeout(()=>{this.textContent='Copy';this.classList.remove('copied')},1500)">Copy</button>
              <button class="btn btn-posted ${dState[i] ? 'is-posted' : ''}" onclick="dState[${i}]=!dState[${i}];saveDailyState();renderDaily();">${dState[i] ? '✓ Posted' : 'Mark Posted'}</button>
            </div>
          </div>`;
      });
      el.innerHTML = html;
    }
    window.dState = dState;
    window.saveDailyState = saveDailyState;
    window.renderDaily = renderDaily;
    renderDaily();
  })
  .catch(() => { document.getElementById('daily-data').innerHTML = '<p style="color:#666;font-size:0.85em;">No daily data tweets yet. They generate at 7AM SAST.</p>'; });
</script>
</body>
</html>
