<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 16px; max-width: 800px; margin: 0 auto; }
h1 { color: #2563eb; font-size: 1.4em; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 0.85em; margin-bottom: 16px; }
.stats { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 14px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-size: 1.4em; font-weight: 700; }
.stat-label { font-size: 0.7em; color: #666; }
.stat-blue .stat-num { color: #2563eb; }
.stat-green .stat-num { color: #10b981; }
.stat-orange .stat-num { color: #f59e0b; }
.stat-red .stat-num { color: #ef4444; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #888; font-size: 0.8em; cursor: pointer; transition: all 0.2s; }
.filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
.category { margin-bottom: 24px; }
.cat-header { font-size: 1em; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #1e1e3a; display: flex; align-items: center; gap: 8px; }
.cat-icon { font-size: 1.2em; }
.task-card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s; }
.task-card.done { opacity: 0.35; }
.task-card:not(.done):hover { border-color: #2563eb; }
.checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #333; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.2s; }
.checkbox:hover { border-color: #10b981; }
.checkbox.checked { background: #10b981; border-color: #10b981; }
.checkbox.checked::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
.task-content { flex: 1; }
.task-title { font-size: 0.9em; line-height: 1.4; }
.task-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.tag { font-size: 0.7em; padding: 2px 8px; border-radius: 10px; }
.tag-site { background: #1e3a8a; color: #93c5fd; }
.tag-blocked { background: #7f1d1d; color: #fca5a5; }
.tag-waiting { background: #78350f; color: #fde68a; }
.tag-free { background: #064e3b; color: #6ee7b7; }
.tag-money { background: #581c87; color: #d8b4fe; }
.done-section { margin-top: 30px; }
.done-toggle { color: #666; font-size: 0.85em; cursor: pointer; margin-bottom: 10px; }
.done-toggle:hover { color: #999; }
</style>
</head>
<body>

<h1>Task Dashboard 🎯</h1>
<p class="subtitle">Updated: 23 Feb 2026</p>
<div style="display:flex;gap:8px;margin-bottom:16px"><a href="index.html" style="color:#2563eb;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #1e3a8a;border-radius:6px">Orderly</a><a href="tasks.html" style="color:#2563eb;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #1e3a8a;border-radius:6px">Tasks</a><a href="betsorted.html" style="color:#2563eb;font-size:0.8em;text-decoration:none;padding:4px 10px;border:1px solid #1e3a8a;border-radius:6px">BetSorted</a></div>

<div class="stats">
  <div class="stat stat-blue"><div class="stat-num" id="total">0</div><div class="stat-label">TOTAL</div></div>
  <div class="stat stat-orange"><div class="stat-num" id="remaining">0</div><div class="stat-label">TODO</div></div>
  <div class="stat stat-green"><div class="stat-num" id="done-count">0</div><div class="stat-label">DONE</div></div>
  <div class="stat stat-red"><div class="stat-num" id="blocked-count">0</div><div class="stat-label">BLOCKED</div></div>
</div>

<div class="filters" id="filters"></div>
<div id="content"></div>
<div class="done-section">
  <div class="done-toggle" id="done-toggle" onclick="toggleDone()">▶ Show completed tasks</div>
  <div id="done-list" style="display:none"></div>
</div>

<script>
const tasks = [
  // BetSorted
  { id: 'bs1', title: 'Request Indexing in GSC for top 5 URLs: best-betting-apps, odds-comparison, betting-calculator, best-odds-finder, betway-review', cat: 'BetSorted', tags: ['site-betsorted'] },
  { id: 'bs2', title: 'Add URC rugby + SA20 cricket to fetch-live-odds.js SPORTS array', cat: 'BetSorted', tags: ['site-betsorted'] },
  { id: 'bs3', title: 'Fix template variable rendering in refresh-hooks.js ({{avg_gap}} not replaced)', cat: 'BetSorted', tags: ['site-betsorted'] },
  { id: 'bs4', title: 'Create separate CryptoCasinoSorted Twitter/X account', cat: 'BetSorted', tags: ['site-crypto', 'blocked'] },
  { id: 'bs5', title: 'Connect TikTok to Postiz + share integration ID', cat: 'BetSorted', tags: ['site-betsorted', 'blocked'] },

  // Backlinks
  { id: 'bl1', title: 'Ajay (Fiverr) — 2 guest posts ~$50 (order placed, waiting)', cat: 'Backlinks', tags: ['money', 'waiting'] },
  { id: 'bl2', title: 'jupiter.co.za — article publication $28 (order placed, waiting)', cat: 'Backlinks', tags: ['money', 'waiting'] },
  { id: 'bl3', title: 'Cape Town Insider guest post (submitted, waiting)', cat: 'Backlinks', tags: ['free', 'waiting'] },
  { id: 'bl4', title: 'Feedspot SA Betting listing (submitted)', cat: 'Backlinks', tags: ['free', 'waiting'] },
  { id: 'bl5', title: 'Write 3-5 Reddit data posts in r/southafrica, r/soccerbetting with BetSorted links', cat: 'Backlinks', tags: ['free'] },

  // Affiliates
  { id: 'af1', title: 'Apply to affiliate programs: 7bit, Wild.io, CoinDepo, Jackbit', cat: 'Affiliates', tags: ['site-crypto', 'money'] },
  { id: 'af2', title: 'Review Play.co.za page live on CryptoCasinoSorted', cat: 'Affiliates', tags: ['site-crypto'] },

  // FitSorted
  { id: 'fs1', title: 'Share FitSorted with wife / friend for testing', cat: 'FitSorted', tags: ['site-fitsorted'] },
  { id: 'fs2', title: 'Meta Business verification for real WhatsApp number', cat: 'FitSorted', tags: ['site-fitsorted', 'blocked'] },
  { id: 'fs3', title: 'Set up Yoco payments for R36/month subscription', cat: 'FitSorted', tags: ['site-fitsorted'] },

  // PaidProperly
  { id: 'pp1', title: 'Convert 3 blog markdown files to HTML for PaidProperly', cat: 'PaidProperly', tags: ['site-paidproperly'] },
  { id: 'pp2', title: 'Add affiliate links to USD salary calculator (Wise, Grey, Xero)', cat: 'PaidProperly', tags: ['site-paidproperly'] },
  { id: 'pp3', title: 'Submit paidproperly.co.za to Bing IndexNow + Google Search Console', cat: 'PaidProperly', tags: ['site-paidproperly'] },

  // Orderly
  { id: 'or1', title: 'Post daily Orderly tweets from dashboard (2/day)', cat: 'Orderly', tags: ['daily'] },

  // Technical
  { id: 'tc1', title: 'Fix Postiz video scheduling (API rejects video uploads)', cat: 'Technical', tags: ['blocked'] },
  { id: 'tc2', title: 'Investigate GA report cron persistent error', cat: 'Technical', tags: [] },
  { id: 'tc3', title: 'Add email step to Reddit scan cron', cat: 'Technical', tags: [] },
  { id: 'tc4', title: 'Fix Chrome extension relay (exclamation mark issue)', cat: 'Technical', tags: ['blocked'] },
];

const catIcons = {
  'BetSorted': '⚽',
  'Backlinks': '🔗',
  'Affiliates': '💰',
  'FitSorted': '🏋️',
  'PaidProperly': '💼',
  'Orderly': '💜',
  'Technical': '⚙️'
};

const catColors = {
  'BetSorted': '#2563eb',
  'Backlinks': '#10b981',
  'Affiliates': '#f59e0b',
  'FitSorted': '#ef4444',
  'PaidProperly': '#8b5cf6',
  'Orderly': '#a78bfa',
  'Technical': '#6b7280'
};

const STORAGE_KEY = 'task-dashboard-v1';
let showDone = false;
let activeFilter = 'all';

function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function toggleTask(id) {
  const s = getState();
  s[id] = !s[id];
  saveState(s);
  render();
}

function toggleDone() {
  showDone = !showDone;
  render();
}

function setFilter(f) {
  activeFilter = f;
  render();
}

function render() {
  const state = getState();
  const cats = [...new Set(tasks.map(t => t.cat))];

  // Filters
  const filterHtml = ['all', ...cats].map(f =>
    `<button class="filter-btn ${activeFilter === f ? 'active' : ''}" onclick="setFilter('${f}')">${f === 'all' ? 'All' : f}</button>`
  ).join('');
  document.getElementById('filters').innerHTML = filterHtml;

  // Filter tasks
  const filtered = activeFilter === 'all' ? tasks : tasks.filter(t => t.cat === activeFilter);
  const pending = filtered.filter(t => !state[t.id]);
  const done = filtered.filter(t => state[t.id]);

  // Stats
  const allDone = tasks.filter(t => state[t.id]).length;
  const allBlocked = tasks.filter(t => !state[t.id] && t.tags.includes('blocked')).length;
  document.getElementById('total').textContent = tasks.length;
  document.getElementById('remaining').textContent = tasks.length - allDone;
  document.getElementById('done-count').textContent = allDone;
  document.getElementById('blocked-count').textContent = allBlocked;

  // Render pending
  let html = '';
  const pendingCats = [...new Set(pending.map(t => t.cat))];
  pendingCats.forEach(cat => {
    const catTasks = pending.filter(t => t.cat === cat);
    html += `<div class="category"><div class="cat-header"><span class="cat-icon">${catIcons[cat] || '📋'}</span><span style="color:${catColors[cat] || '#fff'}">${cat}</span><span style="color:#555;font-size:0.8em">(${catTasks.length})</span></div>`;
    catTasks.forEach(t => {
      html += renderTask(t, false);
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;

  // Render done
  document.getElementById('done-toggle').textContent = showDone ? '▼ Hide completed tasks' : `▶ Show completed tasks (${done.length})`;
  if (showDone && done.length) {
    document.getElementById('done-list').style.display = 'block';
    document.getElementById('done-list').innerHTML = done.map(t => renderTask(t, true)).join('');
  } else {
    document.getElementById('done-list').style.display = 'none';
  }
}

function renderTask(t, isDone) {
  const tagHtml = t.tags.map(tag => {
    if (tag === 'blocked') return '<span class="tag tag-blocked">Blocked</span>';
    if (tag === 'waiting') return '<span class="tag tag-waiting">Waiting</span>';
    if (tag === 'free') return '<span class="tag tag-free">Free</span>';
    if (tag === 'money') return '<span class="tag tag-money">$$$</span>';
    if (tag === 'daily') return '<span class="tag tag-site">Daily</span>';
    if (tag.startsWith('site-')) return `<span class="tag tag-site">${tag.replace('site-','')}</span>`;
    return '';
  }).join('');

  return `<div class="task-card ${isDone ? 'done' : ''}">
    <div class="checkbox ${isDone ? 'checked' : ''}" onclick="toggleTask('${t.id}')"></div>
    <div class="task-content">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">${tagHtml}</div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
